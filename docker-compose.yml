services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: veilleai-postgres
    environment:
      POSTGRES_DB: veilleai
      POSTGRES_USER: veilleai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veilleai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veilleai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: veilleai-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: veilleai-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veilleai-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file: .env

  celery-worker:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: veilleai-celery-worker
    command: celery -A workers.celery_app worker --loglevel=info -Q high,default,low --concurrency=2
    volumes:
      - ./ai:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env

  celery-beat:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: veilleai-celery-beat
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - ./ai:/app
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veilleai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - api

volumes:
  postgres_data:
  es_data:
